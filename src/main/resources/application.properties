spring.application.name=payback-api

# SAFE: Using variables instead of hardcoded passwords
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate & JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Data initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Port configuration for Render
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:payback-secret-key-for-development-only-change-in-production}
jwt.expiration=${JWT_EXPIRATION:604800000}

# Referral Configuration
referral.bonus.amount=50.00

# Withdrawal Configuration
withdrawal.minimum.amount=100.00